<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AppDelivery Rápido · Plataforma completa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #1e293b;
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid #f97316;
    }
    h1 { color: #f97316; margin-bottom: 1rem; }
    .roles {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 2rem 0;
    }
    .role-btn {
      background: #334155;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .role-btn:hover { background: #f97316; transform: scale(1.02); }
    .info { color: #94a3b8; font-size: 0.8rem; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h1><i class="fas fa-box-open"></i> AppDelivery Rápido</h1>
  <p>Plataforma completa de pedidos a domicilio</p>
  <div class="roles">
    <a href="cliente.html" class="role-btn">👤 Cliente</a>
    <a href="comercio.html" class="role-btn">🏪 Comercio</a>
    <a href="repartidor.html" class="role-btn">🏍️ Repartidor</a>
  </div>
  <div class="info">
    <i class="fas fa-info-circle"></i> Los datos se comparten entre roles.<br>
    Abrí varias pestañas para simular usuarios diferentes.
  </div>
</div>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
