<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Comercio · AppDelivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui;
      background: #0f172a;
      color: #f1f5f9;
      padding: 1rem;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 2rem;
      padding: 1.5rem;
    }
    h1, h2 { color: #f97316; margin-bottom: 1rem; }
    .seccion { margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
    .form-producto {
      background: #334155;
      padding: 1rem;
      border-radius: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .form-producto input, .form-producto button {
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: none;
    }
    .form-producto input { background: #1e293b; color: white; flex: 1; }
    .form-producto button { background: #f97316; cursor: pointer; font-weight: bold; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 1rem;
      overflow: hidden;
      margin: 1rem 0;
    }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #f97316; color: #0f172a; }
    button { background: #f97316; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; margin: 0.2rem; }
    .btn-aceptar { background: #10b981; }
    .btn-rechazar { background: #ef4444; }
    .pedido-card {
      background: #334155;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 4px solid #f97316;
    }
    .map {
      height: 200px;
      margin-top: 0.5rem;
      border-radius: 0.8rem;
      overflow: hidden;
    }
    .estado-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .pendiente { background: #f59e0b; }
    .aceptado { background: #10b981; }
    .rechazado { background: #ef4444; }
    .en_camino { background: #3b82f6; }
    .entregado { background: #10b981; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏪 Mi Comercio · Burger House</h1>
  <p style="margin-bottom: 1rem;">ID del comercio: 1 (fijo para esta demo)</p>

  <!-- SECCIÓN: Gestión de productos -->
  <div class="seccion">
    <h2>📦 Administrar productos</h2>
    <div class="form-producto">
      <input type="text" id="nombreProducto" placeholder="Nombre del producto">
      <input type="number" id="precioProducto" placeholder="Precio (ARS)">
      <input type="number" id="stockProducto" placeholder="Stock">
      <button id="btnAgregarProducto">➕ Agregar producto</button>
    </div>
    <table id="tablaProductos">
      <thead><tr><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
      <tbody id="productosBody"></tbody>
    </table>
  </div>

  <!-- SECCIÓN: Pedidos recibidos -->
  <div class="seccion">
    <h2>📋 Pedidos entrantes</h2>
    <div id="pedidosContainer"></div>
  </div>
</div>

<script>
  // === DATOS FIJOS DEL COMERCIO ===
  const COMERCIO_ID = 1;
  const COMERCIO_NOMBRE = "Burger House";

  // === FUNCIONES DE ACCESO A localStorage ===
  function obtenerProductos() {
    return JSON.parse(localStorage.getItem('productos')) || [];
  }
  function guardarProductos(productos) {
    localStorage.setItem('productos', JSON.stringify(productos));
  }
  function obtenerPedidos() {
    return JSON.parse(localStorage.getItem('pedidos')) || [];
  }
  function guardarPedidos(pedidos) {
    localStorage.setItem('pedidos', JSON.stringify(pedidos));
  }

  // === GESTIÓN DE PRODUCTOS ===
  function renderProductos() {
    const productos = obtenerProductos().filter(p => p.comercioId === COMERCIO_ID);
    const tbody = document.getElementById('productosBody');
    tbody.innerHTML = '';
    if (productos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay productos. Agregá uno.</td></tr>';
      return;
    }
    productos.forEach(p => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = p.nombre;
      row.insertCell(1).innerText = `$${p.precio.toLocaleString()}`;
      row.insertCell(2).innerText = p.stock;
      const accionCell = row.insertCell(3);
      const btnEdit = document.createElement('button');
      btnEdit.innerText = 'Editar';
      btnEdit.onclick = () => editarProducto(p.id);
      const btnDel = document.createElement('button');
      btnDel.innerText = 'Eliminar';
      btnDel.onclick = () => eliminarProducto(p.id);
      accionCell.appendChild(btnEdit);
      accionCell.appendChild(btnDel);
    });
  }

  function agregarProducto() {
    const nombre = document.getElementById('nombreProducto').value.trim();
    const precio = parseFloat(document.getElementById('precioProducto').value);
    const stock = parseInt(document.getElementById('stockProducto').value);
    if (!nombre || isNaN(precio) || isNaN(stock)) {
      alert('Completá todos los campos correctamente');
      return;
    }
    const productos = obtenerProductos();
    const nuevoId = Date.now();
    productos.push({
      id: nuevoId,
      nombre: nombre,
      precio: precio,
      stock: stock,
      comercioId: COMERCIO_ID,
      comercioNombre: COMERCIO_NOMBRE
    });
    guardarProductos(productos);
    limpiarFormularioProducto();
    renderProductos();
  }

  function editarProducto(id) {
    const productos = obtenerProductos();
    const producto = productos.find(p => p.id === id);
    if (!producto) return;
    const nuevoNombre = prompt('Nuevo nombre', producto.nombre);
    const nuevoPrecio = parseFloat(prompt('Nuevo precio', producto.precio));
    const nuevoStock = parseInt(prompt('Nuevo stock', producto.stock));
    if (nuevoNombre && !isNaN(nuevoPrecio) && !isNaN(nuevoStock)) {
      producto.nombre = nuevoNombre;
      producto.precio = nuevoPrecio;
      producto.stock = nuevoStock;
      guardarProductos(productos);
      renderProductos();
    }
  }

  function eliminarProducto(id) {
    if (!confirm('¿Eliminar este producto definitivamente?')) return;
    let productos = obtenerProductos();
    productos = productos.filter(p => p.id !== id);
    guardarProductos(productos);
    renderProductos();
  }

  function limpiarFormularioProducto() {
    document.getElementById('nombreProducto').value = '';
    document.getElementById('precioProducto').value = '';
    document.getElementById('stockProducto').value = '';
  }

  // === GESTIÓN DE PEDIDOS ===
  function renderPedidos() {
    const pedidos = obtenerPedidos();
    // Filtrar pedidos que contengan items de este comercio y no estén entregados/cancelados
    const misPedidos = pedidos.filter(p =>
      p.comercioIds.includes(COMERCIO_ID) &&
      p.estado !== 'entregado' &&
      p.estado !== 'cancelado'
    );
    const container = document.getElementById('pedidosContainer');
    if (misPedidos.length === 0) {
      container.innerHTML = '<p>✨ No hay pedidos nuevos o pendientes.</p>';
      return;
    }
    container.innerHTML = '';
    misPedidos.forEach(pedido => {
      const div = document.createElement('div');
      div.className = 'pedido-card';
      // Items del pedido que pertenecen a este comercio (por si hay múltiples comercios)
      const misItems = pedido.items.filter(item => item.comercioId === COMERCIO_ID);
      const itemsHtml = misItems.map(item => `<li>${item.nombre} x ${item.cantidad} = $${(item.precio * item.cantidad).toLocaleString()}</li>`).join('');
      // Badge estado
      const estadoClass = pedido.estado === 'pendiente' ? 'pendiente' : (pedido.estado === 'aceptado' ? 'aceptado' : (pedido.estado === 'rechazado' ? 'rechazado' : 'en_camino'));
      div.innerHTML = `
        <h3>Pedido #${pedido.id}</h3>
        <p><strong>Cliente:</strong> ${pedido.cliente}</p>
        <p><strong>Fecha:</strong> ${new Date(pedido.fecha).toLocaleString()}</p>
        <ul>${itemsHtml}</ul>
        <p><strong>Total (solo tus productos):</strong> $${misItems.reduce((sum, i) => sum + (i.precio * i.cantidad), 0).toLocaleString()}</p>
        <p><strong>Estado global:</strong> <span class="estado-badge ${estadoClass}">${pedido.estado}</span></p>
        <div id="mapa_${pedido.id}" class="map"></div>
      `;
      // Botones de acción si el pedido está pendiente
      if (pedido.estado === 'pendiente') {
        const btnAceptar = document.createElement('button');
        btnAceptar.innerText = '✅ Aceptar pedido';
        btnAceptar.className = 'btn-aceptar';
        btnAceptar.onclick = () => cambiarEstadoPedido(pedido.id, 'aceptado', null);
        const btnRechazar = document.createElement('button');
        btnRechazar.innerText = '❌ Rechazar pedido';
        btnRechazar.className = 'btn-rechazar';
        btnRechazar.onclick = () => rechazarPedido(pedido.id);
        div.appendChild(btnAceptar);
        div.appendChild(btnRechazar);
      } else if (pedido.estado === 'aceptado' && pedido.repartidorId) {
        // Mostrar mensaje de repartidor asignado
        const infoReparto = document.createElement('p');
        infoReparto.innerHTML = `<strong>🛵 Repartidor asignado:</strong> ID ${pedido.repartidorId}`;
        div.appendChild(infoReparto);
      }

      container.appendChild(div);

      // Mostrar mapa si el pedido tiene ubicación del repartidor y el estado es aceptado o en_camino
      if (pedido.ubicacionRepartidor && (pedido.estado === 'aceptado' || pedido.estado === 'en_camino') && pedido.repartidorId) {
        setTimeout(() => {
          const mapDiv = document.getElementById(`mapa_${pedido.id}`);
          if (mapDiv) {
            const map = L.map(mapDiv).setView([pedido.ubicacionRepartidor.lat, pedido.ubicacionRepartidor.lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
              attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            L.marker([pedido.ubicacionRepartidor.lat, pedido.ubicacionRepartidor.lng]).addTo(map)
              .bindTooltip('Repartidor').openTooltip();
          }
        }, 100);
      }
    });
  }

  function cambiarEstadoPedido(pedidoId, nuevoEstado, motivo = null) {
    const pedidos = obtenerPedidos();
    const index = pedidos.findIndex(p => p.id === pedidoId);
    if (index !== -1) {
      pedidos[index].estado = nuevoEstado;
      if (motivo) pedidos[index].rechazoMotivo = motivo;
      guardarPedidos(pedidos);
      renderPedidos(); // refrescar vista
    }
  }

  function rechazarPedido(pedidoId) {
    const motivo = prompt('Motivo del rechazo (el cliente lo verá):');
    if (motivo && motivo.trim() !== '') {
      cambiarEstadoPedido(pedidoId, 'rechazado', motivo.trim());
    } else {
      alert('Debés ingresar un motivo para rechazar el pedido.');
    }
  }

  // === INICIALIZACIÓN Y EVENTOS ===
  document.getElementById('btnAgregarProducto').addEventListener('click', agregarProducto);
  renderProductos();
  renderPedidos();

  // Actualización automática cuando otro rol (cliente, repartidor) modifique datos
  window.addEventListener('storage', (e) => {
    if (e.key === 'productos') renderProductos();
    if (e.key === 'pedidos') renderPedidos();
  });
  // Refrescar pedidos cada 3 segundos por si acaso (complementario)
  setInterval(() => renderPedidos(), 3000);
</script>
</body>
</html>
