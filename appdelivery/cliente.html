<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cliente · AppDelivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui; background: #0f172a; color: #f1f5f9; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; background: #1e293b; border-radius: 2rem; padding: 1.5rem; }
    h1, h2 { color: #f97316; margin-bottom: 1rem; }
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .card { background: #334155; border-radius: 1rem; padding: 1rem; transition: 0.2s; }
    .card:hover { transform: translateY(-4px); border-left: 3px solid #f97316; }
    .precio { color: #f97316; font-weight: bold; font-size: 1.2rem; }
    button { background: #f97316; border: none; padding: 0.4rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; margin-top: 0.5rem; }
    .carrito, .pedidos-activos { background: #0f172a; border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
    .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 0.5rem 0; }
    .map { height: 300px; margin-top: 1rem; border-radius: 1rem; overflow: hidden; }
    .estado { display: inline-block; padding: 0.2rem 0.8rem; border-radius: 40px; font-size: 0.8rem; margin-top: 0.5rem; }
    .pendiente { background: #f59e0b; }
    .aceptado { background: #10b981; }
    .rechazado { background: #ef4444; }
    .en_camino { background: #3b82f6; }
    .entregado { background: #10b981; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 Cliente · AppDelivery</h1>
  <div id="productosContainer" class="productos-grid"></div>
  <div class="carrito">
    <h3>🛍️ Mi pedido actual</h3>
    <div id="carritoItems"></div>
    <div id="carritoTotal"></div>
    <button id="realizarPedido">✅ Confirmar pedido</button>
  </div>
  <div class="pedidos-activos">
    <h3>📦 Estado de mi pedido</h3>
    <div id="miPedidoInfo"></div>
    <div id="mapa" class="map"></div>
  </div>
</div>
<script>
  // Cliente fijo para demo
  const CLIENTE_ID = 1;
  const CLIENTE_NOMBRE = "Juan Pérez";
  let carrito = JSON.parse(localStorage.getItem(`carrito_${CLIENTE_ID}`)) || [];
  let map = null;
  let markerRepartidor = null;

  function guardarCarrito() { localStorage.setItem(`carrito_${CLIENTE_ID}`, JSON.stringify(carrito)); }
  function obtenerProductos() { return JSON.parse(localStorage.getItem('productos')) || []; }
  function obtenerPedidos() { return JSON.parse(localStorage.getItem('pedidos')) || []; }
  function guardarPedidos(pedidos) { localStorage.setItem('pedidos', JSON.stringify(pedidos)); }

  function renderProductos() {
    const productos = obtenerProductos();
    const container = document.getElementById('productosContainer');
    container.innerHTML = '';
    productos.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${prod.nombre}</h3>
        <p>${prod.comercioNombre}</p>
        <p class="precio">$${prod.precio.toLocaleString()}</p>
        <p>Stock: ${prod.stock}</p>
        <button data-id="${prod.id}">➕ Agregar</button>
      `;
      card.querySelector('button').addEventListener('click', () => agregarAlCarrito(prod));
      container.appendChild(card);
    });
  }

  function agregarAlCarrito(prod) {
    const existente = carrito.find(item => item.id === prod.id);
    if (existente) existente.cantidad++;
    else carrito.push({ ...prod, cantidad: 1 });
    guardarCarrito();
    renderCarrito();
  }

  function renderCarrito() {
    const container = document.getElementById('carritoItems');
    const totalContainer = document.getElementById('carritoTotal');
    if (carrito.length === 0) {
      container.innerHTML = '<p>Carrito vacío</p>';
      totalContainer.innerText = '';
      return;
    }
    let html = '', total = 0;
    carrito.forEach((item, idx) => {
      const subtotal = item.precio * item.cantidad;
      total += subtotal;
      html += `<div class="item-carrito">
                <span>${item.nombre} x ${item.cantidad}</span>
                <span>$${subtotal.toLocaleString()}</span>
                <button onclick="eliminarDelCarrito(${idx})">❌</button>
               </div>`;
    });
    container.innerHTML = html;
    totalContainer.innerHTML = `<strong>Total: $${total.toLocaleString()}</strong>`;
  }

  window.eliminarDelCarrito = (idx) => {
    carrito.splice(idx, 1);
    guardarCarrito();
    renderCarrito();
  };

  function realizarPedido() {
    if (carrito.length === 0) return alert('Carrito vacío');
    let pedidos = obtenerPedidos();
    let productos = obtenerProductos();
    const itemsPedido = carrito.map(item => ({
      id: item.id, nombre: item.nombre, cantidad: item.cantidad, precio: item.precio,
      comercioId: item.comercioId, comercioNombre: item.comercioNombre
    }));
    const total = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
    const nuevoPedido = {
      id: Date.now(),
      cliente: CLIENTE_NOMBRE,
      clienteId: CLIENTE_ID,
      fecha: new Date().toISOString(),
      items: itemsPedido,
      total: total,
      estado: 'pendiente',
      comercioIds: [...new Set(itemsPedido.map(i => i.comercioId))],
      repartidorId: null,
      ubicacionRepartidor: null,
      rechazoMotivo: null,
      timestamp: Date.now()
    };
    pedidos.push(nuevoPedido);
    guardarPedidos(pedidos);
    // Actualizar stock
    carrito.forEach(item => {
      const prod = productos.find(p => p.id === item.id);
      if (prod) prod.stock -= item.cantidad;
    });
    localStorage.setItem('productos', JSON.stringify(productos));
    carrito = [];
    guardarCarrito();
    renderCarrito();
    alert('Pedido realizado. Esperá la confirmación del comercio.');
    actualizarEstadoPedido();
  }

  function actualizarEstadoPedido() {
    const pedidos = obtenerPedidos();
    const miPedido = pedidos.filter(p => p.clienteId === CLIENTE_ID).sort((a,b) => b.timestamp - a.timestamp)[0];
    const div = document.getElementById('miPedidoInfo');
    if (!miPedido) {
      div.innerHTML = '<p>No hay pedidos activos</p>';
      if (map) map.remove(); map = null;
      return;
    }
    let estadoClass = '';
    if (miPedido.estado === 'pendiente') estadoClass = 'pendiente';
    else if (miPedido.estado === 'aceptado') estadoClass = 'aceptado';
    else if (miPedido.estado === 'rechazado') estadoClass = 'rechazado';
    else if (miPedido.estado === 'en_camino') estadoClass = 'en_camino';
    else if (miPedido.estado === 'entregado') estadoClass = 'entregado';
    let html = `<p><strong>Pedido #${miPedido.id}</strong> <span class="estado ${estadoClass}">${miPedido.estado.toUpperCase()}</span></p>`;
    if (miPedido.estado === 'rechazado' && miPedido.rechazoMotivo) {
      html += `<p style="color:#ef4444;">Motivo: ${miPedido.rechazoMotivo}</p>`;
    }
    if (miPedido.repartidorId) {
      html += `<p>Repartidor asignado: ID ${miPedido.repartidorId}</p>`;
    }
    div.innerHTML = html;

    // Mostrar mapa si hay ubicación del repartidor
    if (miPedido.ubicacionRepartidor && miPedido.estado !== 'entregado' && miPedido.estado !== 'rechazado') {
      if (!map) {
        map = L.map('mapa').setView([miPedido.ubicacionRepartidor.lat, miPedido.ubicacionRepartidor.lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
      } else {
        map.setView([miPedido.ubicacionRepartidor.lat, miPedido.ubicacionRepartidor.lng], 15);
      }
      if (markerRepartidor) markerRepartidor.remove();
      markerRepartidor = L.marker([miPedido.ubicacionRepartidor.lat, miPedido.ubicacionRepartidor.lng]).addTo(map)
        .bindTooltip('Repartidor en camino').openTooltip();
    } else {
      if (map) { map.remove(); map = null; markerRepartidor = null; }
    }
  }

  document.getElementById('realizarPedido').addEventListener('click', realizarPedido);
  renderProductos();
  renderCarrito();
  actualizarEstadoPedido();

  // Escuchar cambios en localStorage (actualizar en tiempo real)
  window.addEventListener('storage', (e) => {
    if (e.key === 'pedidos') {
      actualizarEstadoPedido();
      renderProductos(); // stock actualizado
    }
  });
  setInterval(() => actualizarEstadoPedido(), 3000);
</script>
</body>
</html>
